name: Build ZFS ISO

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            squashfs-tools xorriso qemu-system-x86 qemu-utils \
            dosfstools e2fsprogs dracut

      - name: Build ZFS ISO
        run: |
          chmod +x build-zfs-iso.sh
          ./build-zfs-iso.sh

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: void-live-x86_64-zfs
          path: void-live-x86_64-zfs.iso
